name: Build-Deploy
on:
  push:
    branches:
      - '*'
      - '*/*'
env:
  IMAGE: docker.pkg.github.com/${{ github.repository }}/soknadsmottaker:${{ github.sha }}
jobs:
  bygg-app:
    name: Bygg app/image, push til github
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v1
      - name: Define build environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ::set-env name=CI::true
          echo ::set-env name=IMAGE_REGISTRY::docker.pkg.github.com/$(echo ${GITHUB_REPOSITORY})
          echo ::set-env name=IMAGE_NAME::$(echo ${GITHUB_REPOSITORY##*/})
          echo ::set-env name=IMAGE_VERSION::$(echo ${GITHUB_WORKFLOW})-$(echo ${GITHUB_SHA})
      - name: Read/save .m2 cache
        uses: actions/cache@v1
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('*/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: '11.x'
      - name: Bygg med maven
        env:
          GITHUB_USERNAME: x-access-token
        run: mvn package --settings .m2/maven-settings.xml --file pom.xml
      - name: Bygg Docker image
        run: |
          docker build -t $IMAGE .
      - name: Login to Github Package Registry
        env:
          DOCKER_USERNAME: x-access-token
          DOCKER_PASSWORD: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin docker.pkg.github.com
      - name: Push Docker image
        run: docker push $IMAGE
  bygg-app-klient:
    name: Bygg soknadsmottaker-api-klient, push til github pkg
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v1
      - name: Read/save .m2 cache
        uses: actions/cache@v1
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('*/api-klient/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11
      - name: prepare release of maven package
        if: github.ref == 'refs/heads/master'
        uses: navikt/bidrag-actions/release-prepare-mvn-pkg@v1.0.1
        with:
          new_snapshot_version_file_name: .new-snapshot-version
          release_version_file_name: .release-version
      - name: is artifact eligable for deployment
        if: github.ref == 'refs/heads/master'
        uses: navikt/bidrag-actions/release-verify-auto-deploy@v1.0.0
        with:
          changelog_file: README.md
          release_version_file: .release-version
      - name: release maven package
        if: github.ref == 'refs/heads/master'
        uses: navikt/bidrag-actions/release-mvn-pkg@v1.0.0
        with:
          new_snapshot_version_file: .new-snapshot-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: commit new version
        if: github.ref == 'refs/heads/master'
        uses: navikt/bidrag-actions/tag-and-commit@v1.0.0
        with:
          message: Bumped version after release of version {}
          pattern: pom.xml
          tag_file: .release-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
