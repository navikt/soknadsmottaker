apiVersion: nais.io/v1alpha1
kind: Application
metadata:
	labels:
		team: team-soknad
	name: soknadsmottaker
	namespace: default
spec:
	env: []
	image: docker.pkg.github.com/soknadmottaker/soknadmottaker:v1.0.0
#	ingresses:
#		- {{ingress}}
	liveness:
		failureThreshold: 10
		initialDelay: 20
		path: /internal/isAlive
		periodSeconds: 5
		timeout: 1
	port: 8080
	prometheus:
		enabled: true
		path: /internal/metrics
	readiness:
		initialDelay: 20
		path: /internal/isReady
		timeout: 1
	replicas:
		cpuThresholdPercentage: 90
		max: 3
		min: 2
	resources:
		limits:
			cpu: 2000m
			memory: {{memorylimit}}
		requests:
			cpu: 1000m
			memory: 256Mi
	vault:
		enabled: true
	secureLogs:
		enabled: true
	team: team-soknad
